<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowBit | Atomatización Inteligente</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body data-theme="light">

    <nav>
        <div class="nav-content container">
            <div class="logo">FlowBit</div>
            <div class="controls">
                <button id="lang-switch" class="btn-secondary">EN / ES</button>
                <button id="theme-toggle" class="btn-icon">🌓</button>
            </div>
        </div>
    </nav>

    <main>
        <section id="hero" class="hero-section">
            <div class="container hero-content">
                <span class="badge" data-i18n="badge-new"></span>
                
                <h1 data-i18n="hero-title"></h1>
                
                <p data-i18n="hero-subtitle"></p>

                <div class="hero-cta">
                    <a href="https://wa.me/593998931349?text=Hello%20FlowBit,%20I%20want%20to%20automate%20my%20business" class="btn-primary" data-i18n="btn-contact" target="_blank"></a>
                    <a href="#real-example" class="btn-link" data-i18n="link-more"></a>
                </div>
            </div>
        </section>

        <section id="problems" class="container reveal">
            <div class="section-header">
                <h2 data-i18n="problem-title"></h2>
            </div>

            <div class="services-grid">
                <div class="card problem-card">
                    <p><span>⚠️</span> <span data-i18n="problem-1"></span></p>
                </div>
                <div class="card problem-card">
                    <p><span>⚠️</span> <span data-i18n="problem-2"></span></p>
                </div>
                <div class="card problem-card">
                    <p><span>⚠️</span> <span data-i18n="problem-3"></span></p>
                </div>
            </div>

            <div class="solution-callout">
                <h3 data-i18n="solution-text"></h3>
                <p class="callout-subtitle" data-i18n="solution-subtext"></p>
            </div>

        </section>

        <section id="services" class="container reveal">
            <div class="section-header">
                <h2 data-i18n="nav-features"></h2>
            </div>

            <div class="services-grid">
                <div class="card">
                    <div class="card-icon">⚡</div>
                    <h3 data-i18n="service-1-title"></h3>
                    <p data-i18n="service-1-desc"></p>
                </div>

                <div class="card">
                    <div class="card-icon">📊</div>
                    <h3 data-i18n="service-2-title"></h3>
                    <p data-i18n="service-2-desc"></p>
                </div>

                <div class="card">
                    <div class="card-icon">🚀</div>
                    <h3 data-i18n="service-3-title"></h3>
                    <p data-i18n="service-3-desc"></p>
                </div>
            </div>
        </section>

        <section id="process" class="container reveal">
            <div class="section-header">
                <h2 data-i18n="process-title"></h2>
                <p class="section-subtitle" data-i18n="process-subtitle"></p>
            </div>

            <div class="process-steps">
                <div class="step">
                    <div class="step-number">01</div>
                    <h3 data-i18n="step-1-title"></h3>
                    <p data-i18n="step-1-desc"></p>
                </div>

                <div class="step">
                    <div class="step-number">02</div>
                    <h3 data-i18n="step-2-title"></h3>
                    <p data-i18n="step-2-desc"></p>
                </div>

                <div class="step">
                    <div class="step-number">03</div>
                    <h3 data-i18n="step-3-title"></h3>
                    <p data-i18n="step-3-desc"></p>
                </div>

                <div class="step">
                    <div class="step-number">04</div>
                    <h3 data-i18n="step-4-title"></h3>
                    <p data-i18n="step-4-desc"></p>
                </div>
            </div>
        </section>

        <section id="tech-stack" class="container reveal">
            <div class="section-header">
                <span class="badge" data-i18n="tech-badge"></span>
                <h2 data-i18n="tech-title"></h2>
                <p class="section-subtitle" data-i18n="tech-subtitle"></p>
            </div>

            <div class="tech-grid">
                <div class="tech-item">
                    <span class="tech-icon">🐍</span>
                    <h3>Python</h3>
                    <p data-i18n="tech-python"></p>
                </div>
                <div class="tech-item">
                    <span class="tech-icon">🌐</span>
                    <h3>JavaScript</h3>
                    <p data-i18n="tech-js"></p>
                </div>
                <div class="tech-item">
                    <span class="tech-icon">🗄️</span>
                    <h3>SQL & Databases</h3>
                    <p data-i18n="tech-sql"></p>
                </div>
                <div class="tech-item">
                    <span class="tech-icon">📊</span>
                    <h3>Data Analysis</h3>
                    <p data-i18n="tech-analysis"></p>
                </div>
            </div>
        </section>

        <section id="real-example" class="container reveal">
            <div class="section-header">
                <span class="badge badge-success" data-i18n="badge-success"></span>
                <h2 data-i18n="showcase-title"></h2>
                <p class="section-subtitle" data-i18n="showcase-desc"></p>
            </div>

            <div class="mockup-stripe">
                <div class="window-content">
                    <img src="assets/images/dashboard-agua.png" 
                    alt="Sistema de Gestión de Agua" 
                    loading="lazy"
                    width="950"
                    height="600">
                </div>
            </div>

            <div class="features-check-grid">
                <div class="check-item">
                    <span class="check-icon">✔️</span>
                    <p><strong data-i18n="check-1-title"></strong></p>
                    <p class="small-text" data-i18n="check-1-desc"></p>
                </div>
                <div class="check-item">
                    <span class="check-icon">✔️</span>
                    <p><strong data-i18n="check-2-title"></strong></p>
                    <p class="small-text" data-i18n="check-2-desc"></p>
                </div>
                <div class="check-item">
                    <span class="check-icon">✔️</span>
                    <p><strong data-i18n="check-3-title"></strong></p>
                    <p class="small-text" data-i18n="check-3-desc"></p>
                </div>
            </div>
        </section>

        <section id="final-cta" class="container reveal">
            <div class="cta-box">
                <h2 data-i18n="final-cta-title"></h2>
                <p data-i18n="final-cta-desc"></p>
                <a href="https://wa.me/593998931349" class="btn-primary" data-i18n="btn-contact"></a>
            </div>
        </section>
        
    </main> 

    <section id="faq" class="container reveal">
        <div class="section-header">
            <h2 data-i18n="faq-title"></h2>
            <p class="section-subtitle" data-i18n="faq-subtitle"></p>
        </div>

        <div class="faq-grid">
            <div class="faq-item">
                <h3 data-i18n="faq-1-q"></h3>
                <p data-i18n="faq-1-a"></p>
            </div>
            <div class="faq-item">
                <h3 data-i18n="faq-2-q"></h3>
                <p data-i18n="faq-2-a"></p>
            </div>
            <div class="faq-item">
                <h3 data-i18n="faq-3-q"></h3>
                <p data-i18n="faq-3-a"></p>
            </div>
        </div>
    </section>

    <footer>
        <div class="container footer-content">
            <div class="footer-brand">
                <div class="logo">FlowBit</div>
                <p data-i18n="footer-text"></p>
            </div>
            <div class="footer-links">
                <a href="#services" data-i18n="nav-features"></a>
                <a href="#process" data-i18n="process-title"></a>
                <a href="https://github.com/wilmersiguencia" target="_blank">GitHub</a>
            </div>
        </div>
    </footer>

    <script type="module" src="js/main.js"></script>
    <a href="https://wa.me/593998931349" class="whatsapp-float" target="-blank">
        <i class="fab fa-whatsapp"></i>
    </a>
</body>
</html>
